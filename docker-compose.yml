services:
  # ── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nucrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nucrm
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - nucrm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis Cache ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nucrm-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - nucrm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── NuCRM Application ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nucrm-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/nucrm
      DATABASE_SSL: "false"
      DATABASE_POOL_SIZE: "10"
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: development
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:3000}"
      SETUP_KEY: ${SETUP_KEY}
      REDIS_URL: redis://redis:6379
      CRON_SECRET: ${CRON_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      COOKIE_SECURE: "false"
      # Sentry
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ORG: ${SENTRY_ORG}
      SENTRY_PROJECT: nucrm-app
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
      SENTRY_ENABLE: ${SENTRY_ENABLE:-false}
      SENTRY_TRACES_SAMPLE_RATE: "0.2"
    ports:
      - "3000:3000"
    user: root
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://0.0.0.0:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Background Worker ────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: nucrm-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/nucrm
      DATABASE_SSL: "false"
      DATABASE_POOL_SIZE: "10"
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      CRON_SECRET: ${CRON_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: development
      # Sentry
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ORG: ${SENTRY_ORG}
      SENTRY_PROJECT: nucrm-worker
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
      SENTRY_ENABLE: ${SENTRY_ENABLE:-false}
    user: root
    command: npx tsx worker.ts
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('ioredis').createClient(process.env.REDIS_URL).ping().then(() => process.exit(0)).catch(() => process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Monitoring Stack ─────────────────────────────────

  # Prometheus - metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: nucrm-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9095:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - nucrm_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      - postgres
      - redis
    profiles:
      - monitoring

  # Grafana - dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: nucrm-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./monitoring/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - nucrm_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - postgres
    profiles:
      - monitoring

  # PostgreSQL Exporter - DB metrics
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: nucrm-postgres-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/nucrm?sslmode=disable"
    depends_on:
      - postgres
    profiles:
      - monitoring

  # Redis Exporter - Redis metrics
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: nucrm-redis-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9121:9121"
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis
    profiles:
      - monitoring

volumes:
  nucrm_postgres_data:
  nucrm_redis_data:
  nucrm_prometheus_data:
  nucrm_grafana_data:
