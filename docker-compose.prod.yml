version: '3.8'

services:
  app:
    image: ghcr.io/nucrm/nucrm-app:latest
    container_name: nucrm-app
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nucrm-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/nucrm/nucrm-app:latest
    container_name: nucrm-worker
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
    command: ["node", "worker.js"]
    volumes:
      - uploads:/app/uploads
    depends_on:
      app:
        condition: service_started
    networks:
      - nucrm-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uploads:

networks:
  nucrm-network:
    external: true
